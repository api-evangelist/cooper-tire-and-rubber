name: Cooper Tire & Rubber
x-type: company
description: >-
  Cooper Tire & Rubber Company is an American manufacturer of replacement
  tires for passenger cars, light trucks, SUVs, and commercial vehicles,
  founded in 1914 and headquartered in Findlay, Ohio. Cooper was acquired by
  The Goodyear Tire & Rubber Company in June 2021 and now operates as a
  subsidiary, retaining the Cooper brand alongside Goodyear. The Cooper
  brand portfolio covers all-season, winter, all-terrain, and sport
  performance tires distributed through retailers and dealers worldwide.
  Cooper Tire does not publish a public developer program or REST APIs. Its
  digital presence is consumer-facing tire selection, retailer locators,
  and post-purchase tire registration.
